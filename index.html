<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phytologic AI Pro</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{font-family:Tahoma;background:#eef4ff;margin:0}
.container{max-width:1200px;margin:auto;padding:20px}
.hero{background:linear-gradient(135deg,#0c5c45,#1c7c64);color:white;padding:25px;border-radius:20px}
.nav{margin:15px 0}
.nav a{background:#0c5c45;color:white;padding:10px;border-radius:10px;text-decoration:none;margin-left:5px}
.card{background:white;padding:20px;border-radius:16px;margin-top:15px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
button{padding:12px;border:none;border-radius:10px;cursor:pointer}
.btn{background:#0c5c45;color:white}
.preview{width:100%;margin-top:10px;border-radius:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.tag{padding:6px 10px;border-radius:10px}
.success{background:#ecfdf5;color:#065f46}
.warn{background:#fff7ed;color:#b45309}
.danger{background:#fef2f2;color:#b91c1c}
</style>
</head>

<body>
<div class="container">

<div class="hero">
<h2><i class="fa-solid fa-leaf"></i> Phytologic AI Pro</h2>
<p>تشخيص ذكي + GradCAM + تحليل متقدم</p>
</div>

<div class="nav">
<a href="index.html">الرئيسية</a>
<a href="alerts.html">التنبيهات</a>
</div>

<div class="card">
<input type="file" id="img"><br><br>
<input type="text" id="api" value="https://phytologic-ai.onrender.com"><br><br>
<button class="btn" onclick="run()">تشخيص</button>
</div>

<img id="preview" class="preview">

<div id="res" class="grid"></div>

</div>

<script>
let file;

img.onchange=e=>{
file=e.target.files[0]
preview.src=URL.createObjectURL(file)
}

window.onload=()=>{
let saved=localStorage.getItem("api")
if(saved) api.value=saved
}

function saveApi(){
localStorage.setItem("api",api.value)
}

async function run(){
if(!file) return alert("اختر صورة")

saveApi()

let f=new FormData()
f.append("file",file)

let r=await fetch(api.value+"/diagnose",{method:"POST",body:f})
let d=await r.json()

res.innerHTML=`

<div class="card">
<h3>التشخيص</h3>
${d.prediction.plant_name}<br>
${d.prediction.disease_name_ar}<br>
${d.prediction.confidence}%
</div>

<div class="card">
<h3>القرار</h3>
${d.decision_analysis.decision}<br>
فرق: ${d.decision_analysis.confidence_diff}
</div>

<div class="card">
<h3>الشدة</h3>
${d.gradcam.severity_percent}%<br>
${d.gradcam.severity_label}
</div>

<div class="card">
<h3>Bullseye</h3>
${d.bullseye_analysis.detected}
</div>

<div class="card">
<h3>التوصيات</h3>
<ul>${d.recommendations.map(x=>`<li>${x}</li>`).join("")}</ul>
</div>

<div class="card">
<h3>المكافحة</h3>
<ul>${d.treatment_program.general.map(x=>`<li>${x}</li>`).join("")}</ul>
</div>

<div class="card">
<h3>GradCAM</h3>
<img src="${d.gradcam.image_url}" class="preview">
</div>

`
}
</script>

</body>
</html>
