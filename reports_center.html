<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Reports Center Pro</title>

<style>
body{font-family:Tahoma;background:#f4f7fb;margin:0}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:12px}
h2{margin:0 0 10px}
img{max-width:100%;border-radius:10px;margin-top:10px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
</style>

</head>
<body>

<div class="container">

<h2>مركز التقارير الاحترافي</h2>

<input type="file" id="file">
<button onclick="run()">تشخيص</button>

<div class="card">
<h3>الصورة الأصلية</h3>
<img id="original">
</div>

<div class="card grid">
<div>
<h3>Grad-CAM</h3>
<img id="gradcam">
</div>

<div>
<h3>شدة الإصابة</h3>
<img id="severity">
</div>
</div>

<div class="card">
<h3>جودة الصورة</h3>
<p id="quality"></p>
<p id="issues"></p>
</div>

<div class="card">
<h3>التشخيص النهائي</h3>
<p id="disease"></p>
<p id="confidence"></p>
<p id="decision"></p>
</div>

<div class="card">
<h3>التوصيات</h3>
<div id="advice"></div>
</div>

<div class="card">
<h3>برنامج المكافحة</h3>
<div id="pesticide"></div>
</div>

<div class="card">
<h3>الطقس</h3>
<p id="temp"></p>
<p id="humidity"></p>
</div>

<div class="card">
<h3>توقع انتشار المرض 🔥</h3>
<p id="risk_percent"></p>
<p id="risk_level"></p>
<p id="risk_action"></p>
<p id="risk_future"></p>
</div>

</div>

<script>

async function run(){

const file=document.getElementById("file").files[0];
if(!file){alert("اختر صورة");return;}

const fd=new FormData();
fd.append("file",file);

const res=await fetch("/diagnose",{method:"POST",body:fd});
const data=await res.json();

console.log(data);

if(data.status==="rejected"){
alert("❌ الصورة غير واضحة");
return;
}

// =====================
// الصور
// =====================
document.getElementById("original").src="data:image/png;base64,"+data.original_image;
document.getElementById("gradcam").src="data:image/png;base64,"+data.gradcam_image;
document.getElementById("severity").src="data:image/png;base64,"+data.severity.severity_overlay_b64;

// =====================
// جودة الصورة
// =====================
document.getElementById("quality").innerText="الجودة: "+data.image_quality.score;
document.getElementById("issues").innerText="المشاكل: "+(data.image_quality.issues.join(", ")||"لا يوجد");

// =====================
// التشخيص
// =====================
document.getElementById("disease").innerText="المرض: "+data.best_prediction.class_name;
document.getElementById("confidence").innerText="الثقة: "+data.best_prediction.confidence+"%";
document.getElementById("decision").innerText="الحالة: "+data.decision_status;

// =====================
// التوصيات
// =====================
document.getElementById("advice").innerHTML=
data.disease_info.advice.map(a=>"<p>"+a+"</p>").join("");

// =====================
// المبيد
// =====================
const p=data.pesticide_program.main;
document.getElementById("pesticide").innerHTML=`
<p>المادة: ${p.active_ingredient}</p>
<p>الاسم: ${p.trade_name}</p>
<p>الجرعة: ${p.dose}</p>
`;

// =====================
// الطقس
// =====================
document.getElementById("temp").innerText="الحرارة: "+data.weather.temperature;
document.getElementById("humidity").innerText="الرطوبة: "+data.weather.humidity;

// =====================
// 🔥 التوقع
// =====================
const r=data.spread_prediction;
document.getElementById("risk_percent").innerText="الخطر: "+r.risk_percent+"%";
document.getElementById("risk_level").innerText="المستوى: "+r.risk_level;
document.getElementById("risk_action").innerText="الإجراء: "+r.action;
document.getElementById("risk_future").innerText="التوقع: "+r.future;

}

</script>

</body>
</html>
