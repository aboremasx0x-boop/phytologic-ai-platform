<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Alerts</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{font-family:Tahoma;background:#f4f7fb;margin:0}
.container{max-width:1100px;margin:auto;padding:20px}
.hero{background:#b91c1c;color:white;padding:20px;border-radius:16px}
.card{background:white;padding:20px;border-radius:16px;margin-top:15px}
.tag{padding:8px 12px;border-radius:10px;font-weight:bold}
.high{background:red;color:white}
.medium{background:orange;color:white}
.low{background:green;color:white}
</style>
</head>

<body>
<div class="container">

<div class="hero">
<h2>🚨 Alerts System</h2>
</div>

<input type="file" id="img"><br><br>
<input type="text" id="api"><br><br>

<button onclick="run()">تحليل</button>

<div id="res"></div>

</div>

<script>
let file;

img.onchange=e=>{
file=e.target.files[0]
}

window.onload=()=>{
let saved=localStorage.getItem("api")
if(saved) api.value=saved
}

async function run(){
let f=new FormData()
f.append("file",file)

let r=await fetch(api.value+"/diagnose",{method:"POST",body:f})
let d=await r.json()

let level="low"
if(d.prediction.confidence>90) level="high"
else if(d.prediction.confidence>70) level="medium"

res.innerHTML=`
<div class="card">
<span class="tag ${level}">${level}</span><br><br>
${d.prediction.disease_name_ar}<br>
${d.prediction.confidence}%<br>
الشدة: ${d.gradcam.severity_percent}%
</div>
`
}
</script>

</body>
</html>
