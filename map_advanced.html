<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الخريطة التفاعلية</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body{
      margin:0;
      font-family:Tahoma,Arial,sans-serif;
      background:#f4f7fb;
      color:#111827;
    }

    .wrap{
      max-width:1400px;
      margin:auto;
      padding:20px;
    }

    .hero{
      background:linear-gradient(135deg,#0f172a,#0f766e);
      color:#fff;
      padding:24px;
      border-radius:22px;
      margin-bottom:18px;
    }

    .hero h1{
      margin:0 0 10px;
    }

    .hero p{
      margin:0;
      line-height:1.8;
      color:rgba(255,255,255,.92);
    }

    .card{
      background:#fff;
      border-radius:18px;
      box-shadow:0 10px 24px rgba(0,0,0,.08);
      padding:18px;
      margin-bottom:18px;
    }

    #map{
      height:650px;
      border-radius:16px;
      overflow:hidden;
    }

    .legend{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .badge{
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:bold;
      background:#f1f5f9;
    }

    a{
      color:#0f766e;
      text-decoration:none;
      font-weight:bold;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>الخريطة التفاعلية للأمراض النباتية</h1>
      <p>تعرض توزيع الحالات ومتوسط شدة الإصابة حسب المناطق اعتمادًا على بيانات النظام.</p>
      <p style="margin-top:10px;"><a href="/">العودة للرئيسية</a></p>
    </div>

    <div class="card">
      <div id="map"></div>
      <div class="legend">
        <div class="badge">أخضر = حالات منخفضة</div>
        <div class="badge">برتقالي = حالات متوسطة</div>
        <div class="badge">أحمر = حالات مرتفعة</div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const REGION_COORDS = {
      "الرياض": [24.7136, 46.6753],
      "مكة": [21.3891, 39.8579],
      "المدينة": [24.5247, 39.5692],
      "القصيم": [26.3592, 43.9818],
      "حائل": [27.5114, 41.7208],
      "تبوك": [28.3998, 36.5715],
      "الجوف": [29.9697, 40.2064],
      "الحدود الشمالية": [30.9753, 41.0381],
      "الشرقية": [26.4207, 50.0888],
      "الباحة": [20.0129, 41.4677],
      "عسير": [18.2164, 42.5053],
      "جازان": [16.8892, 42.5511],
      "نجران": [17.5650, 44.2289]
    };

    const map = L.map('map').setView([24.5, 44.5], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function getColor(count){
      if(count >= 20) return 'red';
      if(count >= 8) return 'orange';
      return 'green';
    }

    function getRadius(count){
      if(count >= 20) return 20;
      if(count >= 8) return 14;
      return 10;
    }

    async function loadMapData(){
      try{
        const res = await fetch('/map/summary');
        const data = await res.json();

        if(!Array.isArray(data) || !data.length){
          alert('لا توجد بيانات خرائط متاحة حاليًا');
          return;
        }

        data.forEach(item => {
          const coords = REGION_COORDS[item.region];
          if(!coords) return;

          const marker = L.circleMarker(coords, {
            radius: getRadius(item.count || 0),
            color: getColor(item.count || 0),
            fillColor: getColor(item.count || 0),
            fillOpacity: 0.65,
            weight: 2
          }).addTo(map);

          marker.bindPopup(`
            <div style="text-align:right;min-width:180px;">
              <strong>المنطقة:</strong> ${item.region}<br>
              <strong>عدد الحالات:</strong> ${item.count ?? 0}<br>
              <strong>متوسط الشدة:</strong> ${item.avg_severity ?? 0}%
            </div>
          `);
        });
      }catch(e){
        console.error(e);
        alert('حدث خطأ أثناء تحميل بيانات الخريطة');
      }
    }

    loadMapData();
  </script>
</body>
</html>
